name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: python:3.9-slim

    services:
      postgres:
        image: postgres:13-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install OS dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends gcc libpq-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          # Stop the build on syntax errors or undefined names
          flake8 service tests --count --select=E9,F63,F7,F82 --show-source --statistics
          # Soft check for everything else (using config from setup.cfg)
          flake8 service tests --count --max-complexity=10 --max-line-length=127 --statistics

      - name: Run unit tests with nosetests
        run: |
          nosetests
        env:
          DATABASE_URI: "postgresql://postgres:postgres@postgres:5432/testdb"
