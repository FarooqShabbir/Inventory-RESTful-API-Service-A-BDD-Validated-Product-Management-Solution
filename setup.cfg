[nosetests]
verbosity=2
with-spec=1
spec-color=1
with-coverage=1
cover-erase=1
cover-package=service

[coverage:run]
branch = True
source = service
omit =
    venv/*
    .venv/*
    tests/*

[coverage:report]
show_missing = True
exclude_lines =
    pragma: no cover
    raise NotImplementedError
    if __name__ == .__main__.:

[flake8]
max-line-length = 127
max-complexity = 10
exclude = .git,__pycache__,venv,.venv,build,dist

[pylint]
max-line-length = 127
disable = C0114,C0115,C0116,R0903,W0212
